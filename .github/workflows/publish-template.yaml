name: "Publish template"

on:
  push:
    branches:
      - main
    paths:
      - "templates/**"

jobs:
  publish-template:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v3

      - name: Publish devcontainer template
        uses: devcontainers/action@v1
        with:
          publish-templates: "true"
          base-path-to-templates: "./templates"
          generate-docs: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR for documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git config pull.rebase false

          branch="docs/automated-update-$GITHUB_RUN_ID"
          git checkout -b "$branch"

          git add "templates/**/README.md"
          git commit -m "docs: automated documentation update [skip ci]" || export NO_UPDATES=true

          if [ "$NO_UPDATES" != "true" ]; then
            git push origin "$branch"
            gh pr create \
              --title "docs: automated documentation update" \
              --body "Automated documentation update" \
              --base main \
              --head "$branch"
          fi
