name: "Publish Docker images"

on:
  workflow_dispatch:

jobs:
  detect-images:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.list.outputs.versions }}

    steps:
      - uses: actions/checkout@v6

      - name: List image versions
        id: list
        run: |
          VERSIONS=$(
            find images -name Dockerfile |
            sed 's|images/||; s|/Dockerfile||' |
            jq -R . | jq -sc .
          )
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT

  build-and-push-image:
    needs: detect-images
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        version: ${{ fromJson(needs.detect-images.outputs.versions) }}

    steps:
      - uses: actions/checkout@v6

      - name: Set lowercase repository owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image ref
        run: |
          IMAGE_NAME=$(echo "${{ matrix.version }}" | cut -d/ -f1)
          IMAGE_TAG=$(echo "${{ matrix.version }}"  | cut -d/ -f2)
          echo "IMAGE_REF=ghcr.io/${REPO_OWNER}/entorno-docker/${IMAGE_NAME}:${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.version }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_REF }}
