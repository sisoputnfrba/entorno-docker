name: "Release"

on:
  push:
    branches:
      - main
    paths:
      - "images/**"
  workflow_dispatch:

jobs:
  detect-images:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.list.outputs.versions }}

    steps:
      - uses: actions/checkout@v6

      - name: List image versions
        id: list
        run: |
          VERSIONS=$(ls images/ | jq -R . | jq -sc .)
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT

  build-and-push-image:
    needs: detect-images
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        version: ${{ fromJson(needs.detect-images.outputs.versions) }}

    steps:
      - uses: actions/checkout@v6

      - name: Set lowercase repository owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.version }}
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/entorno-docker:${{ matrix.version }}
